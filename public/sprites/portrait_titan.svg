<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <radialGradient id="titBg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#eab308" stop-opacity="0.45" />
      <stop offset="65%" stop-color="#854d0e" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#1c1917" stop-opacity="0.95" />
    </radialGradient>
    <linearGradient id="titArmor" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#44403c" />
      <stop offset="50%" stop-color="#292524" />
      <stop offset="100%" stop-color="#0c0a09" />
    </linearGradient>
    <linearGradient id="titHighlight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fef08a" />
      <stop offset="100%" stop-color="#ca8a04" opacity="0.1" />
    </linearGradient>
    <linearGradient id="titYellowGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fef9c3" />
      <stop offset="40%" stop-color="#eab308" />
      <stop offset="100%" stop-color="#ca8a04" />
    </linearGradient>
    <filter id="titGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <circle cx="256" cy="256" r="236" fill="url(#titBg)" stroke="url(#titYellowGlow)" stroke-width="10" />
  <circle cx="256" cy="256" r="212" fill="none" stroke="#fef08a" stroke-opacity="0.2" stroke-width="3" stroke-dasharray="16 10" />

  <!-- Heavy Mech Bust & Shoulder Armor -->
  <g>
    <path d="M 80 440 L 135 340 L 210 365 L 175 440 Z" fill="url(#titArmor)" stroke="#ca8a04" stroke-width="4" />
    <path d="M 100 425 L 135 350 L 195 370" fill="none" stroke="url(#titHighlight)" stroke-width="2" />
    
    <path d="M 432 440 L 377 340 L 302 365 L 337 440 Z" fill="url(#titArmor)" stroke="#ca8a04" stroke-width="4" />
    <path d="M 412 425 L 377 350 L 317 370" fill="none" stroke="url(#titHighlight)" stroke-width="2" />

    <path d="M 170 440 L 210 360 L 256 380 L 302 360 L 342 440 Z" fill="#1c1917" stroke="url(#titYellowGlow)" stroke-width="4" />
    <polygon points="256,375 275,410 256,430 237,410" fill="url(#titYellowGlow)" filter="url(#titGlow)" />
    <path d="M 210 360 L 256 335 L 302 360" fill="#292524" stroke="#eab308" stroke-width="3" />
  </g>

  <!-- Heavy Neck Guard -->
  <path d="M 205 335 L 256 350 L 307 335 L 285 295 L 227 295 Z" fill="#0c0a09" stroke="#eab308" stroke-width="3" />

  <!-- Heavy Mech Juggernaut Helmet -->
  <g>
    <path d="M 155 245 C 155 135, 357 135, 357 245 L 335 325 L 256 355 L 177 325 Z" fill="url(#titArmor)" stroke="#eab308" stroke-width="5" />
    
    <!-- Reinforced Crest Plate -->
    <path d="M 256 110 L 280 180 L 256 200 L 232 180 Z" fill="#854d0e" stroke="url(#titYellowGlow)" stroke-width="2" />

    <!-- Cheek Armor -->
    <path d="M 170 245 L 210 315 L 256 340 L 302 315 L 342 245 L 320 235 L 256 245 L 192 235 Z" fill="#0c0a09" stroke="#ca8a04" stroke-width="4" />

    <!-- Heavy Horizontal Optics Visor -->
    <g filter="url(#titGlow)">
      <path d="M 180 225 L 332 225 L 310 265 L 256 280 L 202 265 Z" fill="#ca8a04" stroke="url(#titYellowGlow)" stroke-width="4" />
      <polygon points="195,237 245,237 238,253 202,253" fill="#fef9c3" />
      <polygon points="317,237 267,237 274,253 310,253" fill="#fef9c3" />
      <line x1="185" y1="229" x2="327" y2="229" stroke="#ffffff" stroke-width="3" stroke-linecap="round" />
    </g>
  </g>
</svg>
