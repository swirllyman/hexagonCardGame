<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Heavy Industrial Metallic Yellow/Black Background -->
    <radialGradient id="titBg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#eab308" stop-opacity="0.5" />
      <stop offset="65%" stop-color="#854d0e" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#1c1917" stop-opacity="0.98" />
    </radialGradient>

    <linearGradient id="titPlate" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#78716c" />
      <stop offset="50%" stop-color="#44403c" />
      <stop offset="100%" stop-color="#1c1917" />
    </linearGradient>

    <linearGradient id="titYellowGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fef9c3" />
      <stop offset="40%" stop-color="#eab308" />
      <stop offset="100%" stop-color="#ca8a04" />
    </linearGradient>

    <filter id="titGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Industrial Gear Notch Outer Ring -->
  <circle cx="256" cy="256" r="236" fill="url(#titBg)" stroke="url(#titYellowGlow)" stroke-width="12" />
  <circle cx="256" cy="256" r="212" fill="none" stroke="#fef08a" stroke-opacity="0.3" stroke-width="4" stroke-dasharray="32 16" />

  <!-- Massive Hydraulic Mech Shoulder Blocks -->
  <g>
    <!-- Left Huge Boxy Shoulder -->
    <rect x="50" y="310" width="130" height="150" rx="16" fill="url(#titPlate)" stroke="url(#titYellowGlow)" stroke-width="5" />
    <path d="M 65 330 L 165 330" stroke="#ca8a04" stroke-width="4" />
    <circle cx="90" cy="360" r="8" fill="#ca8a04" />

    <!-- Right Huge Boxy Shoulder -->
    <rect x="332" y="310" width="130" height="150" rx="16" fill="url(#titPlate)" stroke="url(#titYellowGlow)" stroke-width="5" />
    <path d="M 347 330 L 447 330" stroke="#ca8a04" stroke-width="4" />
    <circle cx="422" cy="360" r="8" fill="#ca8a04" />

    <!-- Mech Chest Grille & Heavy Armor Plate -->
    <path d="M 160 440 L 190 350 L 256 370 L 322 350 L 352 440 Z" fill="#0c0a09" stroke="#eab308" stroke-width="4" />
    <line x1="210" y1="380" x2="302" y2="380" stroke="#eab308" stroke-width="4" />
    <line x1="218" y1="398" x2="294" y2="398" stroke="#eab308" stroke-width="4" />
    <line x1="226" y1="416" x2="286" y2="416" stroke="#eab308" stroke-width="4" />
  </g>

  <!-- Heavy Mech Juggernaut Boxy Reinforced Helmet & Monocle Radar Eyes -->
  <g>
    <!-- Square Fortified Mech Head -->
    <rect x="160" y="170" width="192" height="170" rx="20" fill="url(#titPlate)" stroke="url(#titYellowGlow)" stroke-width="6" />

    <!-- Crown Crest Plate with Exhaust Pipes -->
    <rect x="236" y="100" width="40" height="80" rx="8" fill="#292524" stroke="#eab308" stroke-width="3" />
    <rect x="200" y="120" width="24" height="60" rx="6" fill="#1c1917" stroke="#ca8a04" stroke-width="2" />
    <rect x="288" y="120" width="24" height="60" rx="6" fill="#1c1917" stroke="#ca8a04" stroke-width="2" />

    <!-- Heavy Iron Face Shield with Slits -->
    <rect x="180" y="220" width="152" height="100" rx="12" fill="#0c0a09" stroke="#78716c" stroke-width="4" />

    <!-- Glowing Hexagonal Single Cyclops Radar Eye -->
    <g filter="url(#titGlow)">
      <polygon points="256,230 286,245 286,275 256,290 226,275 226,245" fill="#fef9c3" stroke="#eab308" stroke-width="4" />
      <circle cx="256" cy="260" r="10" fill="#eab308" />
    </g>

    <!-- Side Heavy Bolt Rivets -->
    <circle cx="175" cy="190" r="5" fill="#eab308" />
    <circle cx="337" cy="190" r="5" fill="#eab308" />
    <circle cx="175" cy="320" r="5" fill="#eab308" />
    <circle cx="337" cy="320" r="5" fill="#eab308" />
  </g>
</svg>
