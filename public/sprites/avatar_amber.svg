<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.4" />
      <stop offset="70%" stop-color="#b45309" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#090d16" stop-opacity="0.95" />
    </radialGradient>
    <linearGradient id="strokeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fef3c7" />
      <stop offset="100%" stop-color="#d97706" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <circle cx="256" cy="256" r="236" fill="url(#bgGlow)" stroke="url(#strokeGrad)" stroke-width="12" />
  <circle cx="256" cy="256" r="210" fill="none" stroke="#fef3c7" stroke-opacity="0.25" stroke-width="4" stroke-dasharray="12 8" />

  <!-- Amber Sun Rune Crest -->
  <g filter="url(#glow)">
    <circle cx="256" cy="256" r="70" fill="none" stroke="url(#strokeGrad)" stroke-width="20" />
    <!-- Sun Rays -->
    <path d="M 256 110 L 256 160 M 256 352 L 256 402 M 110 256 L 160 256 M 352 256 L 402 256 M 153 153 L 188 188 M 324 324 L 359 359 M 153 359 L 188 324 M 324 188 L 359 153" stroke="url(#strokeGrad)" stroke-width="18" stroke-linecap="round" />
    <circle cx="256" cy="256" r="24" fill="#fef3c7" />
  </g>
</svg>
