<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f43f5e" stop-opacity="0.4" />
      <stop offset="70%" stop-color="#881337" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#090d16" stop-opacity="0.95" />
    </radialGradient>
    <linearGradient id="strokeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fda4af" />
      <stop offset="100%" stop-color="#e11d48" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <circle cx="256" cy="256" r="236" fill="url(#bgGlow)" stroke="url(#strokeGrad)" stroke-width="12" />
  <circle cx="256" cy="256" r="210" fill="none" stroke="#ffe4e6" stroke-opacity="0.25" stroke-width="4" stroke-dasharray="12 8" />

  <!-- Crossed Crimson Swords Crest -->
  <g filter="url(#glow)" stroke="url(#strokeGrad)" stroke-linecap="round" stroke-linejoin="round">
    <path d="M 140 372 L 372 140" stroke-width="28" />
    <path d="M 372 140 L 320 140 L 372 192 Z" fill="url(#strokeGrad)" />
    <path d="M 170 330 L 130 370" stroke-width="18" />

    <path d="M 372 372 L 140 140" stroke-width="28" />
    <path d="M 140 140 L 192 140 L 140 192 Z" fill="url(#strokeGrad)" />
    <path d="M 340 330 L 380 370" stroke-width="18" />
  </g>
  <circle cx="256" cy="256" r="24" fill="#fef3c7" stroke="#e11d48" stroke-width="6" />
</svg>
