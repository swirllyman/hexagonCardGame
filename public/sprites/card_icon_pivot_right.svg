<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.35" />
      <stop offset="70%" stop-color="#78350f" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#090d16" stop-opacity="0.95" />
    </radialGradient>
    <linearGradient id="strokeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24" />
      <stop offset="100%" stop-color="#d97706" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background Hexagon -->
  <polygon points="256,16 464,136 464,376 256,496 48,376 48,136" fill="url(#bgGlow)" stroke="url(#strokeGrad)" stroke-width="8" />

  <!-- Inner Hex Ring -->
  <polygon points="256,40 440,148 440,364 256,472 72,364 72,148" fill="none" stroke="#fef3c7" stroke-opacity="0.2" stroke-width="2" />

  <!-- Clockwise Turning Arrow (Pivot Right) -->
  <g filter="url(#glow)">
    <path d="M 180 180 A 100 100 0 1 1 200 340" fill="none" stroke="url(#strokeGrad)" stroke-width="32" stroke-linecap="round" />
    <path d="M 230 310 L 200 365 L 145 335" fill="none" stroke="url(#strokeGrad)" stroke-width="32" stroke-linecap="round" stroke-linejoin="round" />
  </g>

  <!-- Central Rune Symbol -->
  <circle cx="256" cy="256" r="16" fill="#fef3c7" />
</svg>
