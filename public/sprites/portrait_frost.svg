<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Glacial Ice Cyan/Blue Background -->
    <radialGradient id="froBg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#67e8f9" stop-opacity="0.55" />
      <stop offset="65%" stop-color="#0891b2" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#083344" stop-opacity="0.98" />
    </radialGradient>

    <linearGradient id="froIce" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#cffafe" />
      <stop offset="50%" stop-color="#164e63" />
      <stop offset="100%" stop-color="#083344" />
    </linearGradient>

    <linearGradient id="froGlowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ecfeff" />
      <stop offset="40%" stop-color="#67e8f9" />
      <stop offset="100%" stop-color="#0284c7" />
    </linearGradient>

    <filter id="froGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Glacial Crystal Outer Ring -->
  <circle cx="256" cy="256" r="236" fill="url(#froBg)" stroke="url(#froGlowGrad)" stroke-width="10" />
  <circle cx="256" cy="256" r="215" fill="none" stroke="#a5f3fc" stroke-opacity="0.35" stroke-width="3" stroke-dasharray="16 8 8 8" />

  <!-- Crystalline Ice Armor Shoulders & Frost Mantle -->
  <g>
    <!-- Left Crystalline Spiked Pauldron -->
    <polygon points="60,450 120,310 190,340 160,450" fill="url(#froIce)" stroke="url(#froGlowGrad)" stroke-width="4" />
    <polygon points="40,380 120,310 140,390" fill="#a5f3fc" filter="url(#froGlow)" />

    <!-- Right Crystalline Spiked Pauldron -->
    <polygon points="452,450 392,310 322,340 352,450" fill="url(#froIce)" stroke="url(#froGlowGrad)" stroke-width="4" />
    <polygon points="472,380 392,310 372,390" fill="#a5f3fc" filter="url(#froGlow)" />

    <!-- Ice Templar Collar & Chest Crystal Gem -->
    <path d="M 175 440 L 210 355 L 256 375 L 302 355 L 337 440 Z" fill="#083344" stroke="#06b6d4" stroke-width="4" />
    <polygon points="256,365 278,405 256,430 234,405" fill="url(#froGlowGrad)" filter="url(#froGlow)" />
  </g>

  <!-- Ice Templar Greathelm & Sharded Crystal Crown -->
  <g>
    <!-- Templar Bucket Helm Frame -->
    <path d="M 165 240 C 165 120, 347 120, 347 240 L 330 330 L 256 360 L 182 330 Z" fill="url(#froIce)" stroke="url(#froGlowGrad)" stroke-width="5" />

    <!-- Sharp Glacial Crystal Crown Peaks -->
    <polygon points="256,50 280,150 256,180 232,150" fill="#ecfeff" stroke="#67e8f9" stroke-width="3" filter="url(#froGlow)" />
    <polygon points="190,90 225,160 195,175 165,130" fill="#22d3ee" stroke="#0891b2" stroke-width="2" />
    <polygon points="322,90 347,130 317,175 287,160" fill="#22d3ee" stroke="#0891b2" stroke-width="2" />

    <!-- Templar Cross Visor Faceplate -->
    <path d="M 175 240 L 215 315 L 256 335 L 297 315 L 337 240 L 256 250 Z" fill="#061a24" stroke="#0891b2" stroke-width="4" />

    <!-- Glowing Blue Ice Cross Visor -->
    <g filter="url(#froGlow)">
      <!-- Horizontal Eyeslit -->
      <line x1="185" y1="242" x2="327" y2="242" stroke="#ecfeff" stroke-width="6" stroke-linecap="round" />
      <!-- Vertical Center Slit -->
      <line x1="256" y1="215" x2="256" y2="305" stroke="#ecfeff" stroke-width="6" stroke-linecap="round" />
    </g>
  </g>
</svg>
