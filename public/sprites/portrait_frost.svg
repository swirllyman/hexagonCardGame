<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <radialGradient id="froBg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#67e8f9" stop-opacity="0.45" />
      <stop offset="65%" stop-color="#0891b2" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#083344" stop-opacity="0.95" />
    </radialGradient>
    <linearGradient id="froArmor" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#334155" />
      <stop offset="50%" stop-color="#164e63" />
      <stop offset="100%" stop-color="#083344" />
    </linearGradient>
    <linearGradient id="froHighlight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#cffafe" />
      <stop offset="100%" stop-color="#06b6d4" opacity="0.1" />
    </linearGradient>
    <linearGradient id="froIceGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ecfeff" />
      <stop offset="40%" stop-color="#67e8f9" />
      <stop offset="100%" stop-color="#0891b2" />
    </linearGradient>
    <filter id="froGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <circle cx="256" cy="256" r="236" fill="url(#froBg)" stroke="url(#froIceGlow)" stroke-width="10" />
  <circle cx="256" cy="256" r="212" fill="none" stroke="#a5f3fc" stroke-opacity="0.2" stroke-width="3" stroke-dasharray="16 10" />

  <!-- Bust & Shoulder Armor -->
  <g>
    <path d="M 90 440 L 140 350 L 210 370 L 180 440 Z" fill="url(#froArmor)" stroke="#0891b2" stroke-width="3" />
    <path d="M 105 425 L 140 360 L 195 375" fill="none" stroke="url(#froHighlight)" stroke-width="2" />
    
    <path d="M 422 440 L 372 350 L 302 370 L 332 440 Z" fill="url(#froArmor)" stroke="#0891b2" stroke-width="3" />
    <path d="M 407 425 L 372 360 L 317 375" fill="none" stroke="url(#froHighlight)" stroke-width="2" />

    <path d="M 175 440 L 210 365 L 256 385 L 302 365 L 337 440 Z" fill="#083344" stroke="url(#froIceGlow)" stroke-width="4" />
    <polygon points="256,380 275,415 256,435 237,415" fill="url(#froIceGlow)" filter="url(#froGlow)" />
    <path d="M 210 365 L 256 340 L 302 365" fill="#164e63" stroke="#67e8f9" stroke-width="3" />
  </g>

  <!-- Neck Guard -->
  <path d="M 210 340 L 256 355 L 302 340 L 285 300 L 227 300 Z" fill="#083344" stroke="#67e8f9" stroke-width="3" />

  <!-- Helmet & Ice Templar Visor -->
  <g>
    <path d="M 160 250 C 160 140, 352 140, 352 250 L 330 330 L 256 360 L 182 330 Z" fill="url(#froArmor)" stroke="#67e8f9" stroke-width="5" />
    
    <!-- Ice Crystal Crown Peaks -->
    <polygon points="256,90 276,170 256,190 236,170" fill="#a5f3fc" stroke="url(#froIceGlow)" stroke-width="2" filter="url(#froGlow)" />
    <polygon points="190,130 220,180 195,190 175,160" fill="#06b6d4" />
    <polygon points="322,130 337,160 317,190 292,180" fill="#06b6d4" />

    <!-- Cheek Armor -->
    <path d="M 175 250 L 215 320 L 256 345 L 297 320 L 337 250 L 315 240 L 256 250 L 197 240 Z" fill="#083344" stroke="#0891b2" stroke-width="4" />

    <!-- Glowing Frost Visor -->
    <g filter="url(#froGlow)">
      <path d="M 185 230 L 327 230 L 305 270 L 256 285 L 207 270 Z" fill="#0891b2" stroke="url(#froIceGlow)" stroke-width="4" />
      <polygon points="200,242 245,242 238,258 207,258" fill="#ecfeff" />
      <polygon points="312,242 267,242 274,258 305,258" fill="#ecfeff" />
      <line x1="190" y1="234" x2="322" y2="234" stroke="#ffffff" stroke-width="3" stroke-linecap="round" />
    </g>
  </g>
</svg>
