<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.35" />
      <stop offset="70%" stop-color="#064e3b" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#090d16" stop-opacity="0.95" />
    </radialGradient>
    <linearGradient id="strokeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background Hexagon -->
  <polygon points="256,16 464,136 464,376 256,496 48,376 48,136" fill="url(#bgGlow)" stroke="url(#strokeGrad)" stroke-width="8" />

  <!-- Inner Hex Ring -->
  <polygon points="256,40 440,148 440,364 256,472 72,364 72,148" fill="none" stroke="#a7f3d0" stroke-opacity="0.2" stroke-width="2" />

  <!-- Downward Retreat Footprints / Arrows (Tactical Retreat) -->
  <g filter="url(#glow)">
    <!-- Main Arrow Shaft -->
    <line x1="256" y1="150" x2="256" y2="340" stroke="url(#strokeGrad)" stroke-width="32" stroke-linecap="round" />
    <!-- Down Arrow Head -->
    <path d="M 180 270 L 256 350 L 332 270" fill="none" stroke="url(#strokeGrad)" stroke-width="32" stroke-linecap="round" stroke-linejoin="round" />
    <!-- Secondary Step Echo -->
    <path d="M 200 190 L 256 240 L 312 190" fill="none" stroke="url(#strokeGrad)" stroke-width="20" stroke-linecap="round" stroke-linejoin="round" opacity="0.7" />
  </g>
</svg>
