<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#34d399" stop-opacity="0.4" />
      <stop offset="70%" stop-color="#047857" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#090d16" stop-opacity="0.95" />
    </radialGradient>
    <linearGradient id="strokeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a7f3d0" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <circle cx="256" cy="256" r="236" fill="url(#bgGlow)" stroke="url(#strokeGrad)" stroke-width="12" />
  <circle cx="256" cy="256" r="210" fill="none" stroke="#d1fae5" stroke-opacity="0.25" stroke-width="4" stroke-dasharray="12 8" />

  <!-- Emerald Nature Leaf / Ranger Emblem -->
  <g filter="url(#glow)">
    <path d="M 256 120 C 370 160 380 340 256 390 C 132 340 142 160 256 120 Z" fill="none" stroke="url(#strokeGrad)" stroke-width="24" stroke-linejoin="round" />
    <path d="M 256 160 L 256 350" stroke="url(#strokeGrad)" stroke-width="16" stroke-linecap="round" />
    <path d="M 256 220 C 300 210 320 240 320 240" stroke="url(#strokeGrad)" stroke-width="12" stroke-linecap="round" fill="none" />
    <path d="M 256 270 C 210 260 190 290 190 290" stroke="url(#strokeGrad)" stroke-width="12" stroke-linecap="round" fill="none" />
  </g>
</svg>
