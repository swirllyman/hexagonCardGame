<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Emerald Nature / Druid Radiant Radial Background -->
    <radialGradient id="serBg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#34d399" stop-opacity="0.5" />
      <stop offset="60%" stop-color="#059669" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#022c22" stop-opacity="0.98" />
    </radialGradient>

    <linearGradient id="serWood" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#78350f" />
      <stop offset="50%" stop-color="#451a03" />
      <stop offset="100%" stop-color="#1c1917" />
    </linearGradient>

    <linearGradient id="serLeafGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ecfdf5" />
      <stop offset="40%" stop-color="#34d399" />
      <stop offset="100%" stop-color="#10b981" />
    </linearGradient>

    <filter id="serGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Leaf/Bio-Organic Hex Outer Ring -->
  <circle cx="256" cy="256" r="236" fill="url(#serBg)" stroke="url(#serLeafGlow)" stroke-width="10" />
  <circle cx="256" cy="256" r="215" fill="none" stroke="#a7f3d0" stroke-opacity="0.35" stroke-width="3" stroke-dasharray="14 10" />

  <!-- Leafy Organic Shoulder Cloak -->
  <g>
    <!-- Left Leaf Mantle -->
    <path d="M 80 450 C 90 330 180 320 210 360 L 160 450 Z" fill="#047857" stroke="url(#serLeafGlow)" stroke-width="3" />
    <path d="M 60 410 Q 120 320 180 340" stroke="#a7f3d0" stroke-width="3" fill="none" />

    <!-- Right Leaf Mantle -->
    <path d="M 432 450 C 422 330 332 320 302 360 L 352 450 Z" fill="#047857" stroke="url(#serLeafGlow)" stroke-width="3" />
    <path d="M 452 410 Q 392 320 332 340" stroke="#a7f3d0" stroke-width="3" fill="none" />

    <!-- Wooden Armor Core & Glowing Heart Gem -->
    <path d="M 180 440 L 210 360 L 256 380 L 302 360 L 332 440 Z" fill="url(#serWood)" stroke="#059669" stroke-width="4" />
    <circle cx="256" cy="405" r="18" fill="url(#serLeafGlow)" filter="url(#serGlow)" />
  </g>

  <!-- Druidic Leaf Crown & Organic Mask -->
  <g>
    <!-- Organic Helm Base -->
    <path d="M 160 250 C 160 130, 352 130, 352 250 L 330 335 L 256 365 L 182 335 Z" fill="url(#serWood)" stroke="#10b981" stroke-width="5" />

    <!-- Huge Sprouting Antler / Leaf Crown -->
    <!-- Left Antler Branch -->
    <path d="M 230 160 Q 150 100 100 30 Q 140 80 180 120 Q 120 70 80 80 Q 150 130 210 170 Z" fill="url(#serLeafGlow)" filter="url(#serGlow)" />
    <!-- Right Antler Branch -->
    <path d="M 282 160 Q 362 100 412 30 Q 372 80 332 120 Q 392 70 432 80 Q 362 130 302 170 Z" fill="url(#serLeafGlow)" filter="url(#serGlow)" />

    <!-- Carved Wooden Faceplate -->
    <path d="M 175 250 L 215 320 L 256 345 L 297 320 L 337 250 L 256 265 Z" fill="#022c22" stroke="#059669" stroke-width="4" />

    <!-- Emerald Leaf-Shaped Glowing Eyes -->
    <g filter="url(#serGlow)">
      <path d="M 190 235 Q 220 220 240 245 Q 210 260 190 235 Z" fill="#ecfdf5" stroke="#34d399" stroke-width="2" />
      <path d="M 322 235 Q 292 220 272 245 Q 302 260 322 235 Z" fill="#ecfdf5" stroke="#34d399" stroke-width="2" />
    </g>
  </g>
</svg>
