<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Fiery Amber/Orange Fiery Radial Background -->
    <radialGradient id="ignBg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.55" />
      <stop offset="65%" stop-color="#b45309" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#451a03" stop-opacity="0.98" />
    </radialGradient>

    <!-- Obsidian Volcanic Armor & Gold Inlays -->
    <linearGradient id="ignObsidian" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#292524" />
      <stop offset="50%" stop-color="#1c1917" />
      <stop offset="100%" stop-color="#0c0a09" />
    </linearGradient>

    <linearGradient id="ignFlameGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fffbeb" />
      <stop offset="30%" stop-color="#fef08a" />
      <stop offset="70%" stop-color="#f59e0b" />
      <stop offset="100%" stop-color="#dc2626" />
    </linearGradient>

    <filter id="ignGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="9" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Fiery Ring with Magma Spikes Outer Ring -->
  <circle cx="256" cy="256" r="236" fill="url(#ignBg)" stroke="url(#ignFlameGlow)" stroke-width="12" />
  <circle cx="256" cy="256" r="212" fill="none" stroke="#fde047" stroke-opacity="0.35" stroke-width="3" stroke-dasharray="16 12" />

  <!-- Molten Rock Shoulders & Glowing Core -->
  <g>
    <!-- Left Magma Pauldron -->
    <path d="M 70 440 L 130 330 L 205 355 L 165 440 Z" fill="url(#ignObsidian)" stroke="url(#ignFlameGlow)" stroke-width="4" />
    <!-- Cracks of Lava on Left Shoulder -->
    <path d="M 100 400 L 130 350 L 160 380" stroke="#f59e0b" stroke-width="3" fill="none" filter="url(#ignGlow)" />

    <!-- Right Magma Pauldron -->
    <path d="M 442 440 L 382 330 L 307 355 L 347 440 Z" fill="url(#ignObsidian)" stroke="url(#ignFlameGlow)" stroke-width="4" />
    <!-- Cracks of Lava on Right Shoulder -->
    <path d="M 412 400 L 382 350 L 352 380" stroke="#f59e0b" stroke-width="3" fill="none" filter="url(#ignGlow)" />

    <!-- Molten Core Chestpiece -->
    <path d="M 175 440 L 210 365 L 256 385 L 302 365 L 337 440 Z" fill="#1c1917" stroke="#b45309" stroke-width="4" />
    <polygon points="256,375 285,420 256,445 227,420" fill="url(#ignFlameGlow)" filter="url(#ignGlow)" />
  </g>

  <!-- Flame Demon Horned Helmet -->
  <g>
    <!-- Helmet Outer Obsidian Shell -->
    <path d="M 160 250 C 160 130, 352 130, 352 250 L 330 330 L 256 360 L 182 330 Z" fill="url(#ignObsidian)" stroke="#f59e0b" stroke-width="5" />

    <!-- Huge Curved Flame Demon Horns -->
    <path d="M 180 180 Q 110 120 70 30 Q 130 80 190 140 Z" fill="url(#ignFlameGlow)" filter="url(#ignGlow)" />
    <path d="M 332 180 Q 402 120 442 30 Q 382 80 322 140 Z" fill="url(#ignFlameGlow)" filter="url(#ignGlow)" />

    <!-- Center Flaming Crest Crown -->
    <polygon points="256,70 275,140 256,170 237,140" fill="#dc2626" filter="url(#ignGlow)" />
    <polygon points="256,90 268,135 256,155 244,135" fill="#fef08a" />

    <!-- Angular Heavy Face Mask with Heat Vents -->
    <path d="M 175 250 L 215 320 L 256 345 L 297 320 L 337 250 L 256 265 Z" fill="#0c0a09" stroke="#b45309" stroke-width="4" />

    <!-- Fierce Angled Blazing Orange Visor -->
    <g filter="url(#ignGlow)">
      <polygon points="190,230 245,238 235,262 195,250" fill="#fffbeb" stroke="#f59e0b" stroke-width="3" />
      <polygon points="322,230 267,238 277,262 317,250" fill="#fffbeb" stroke="#f59e0b" stroke-width="3" />
      <line x1="185" y1="230" x2="327" y2="230" stroke="#fef08a" stroke-width="4" />
    </g>
  </g>
</svg>
