<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <radialGradient id="ignBg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.45" />
      <stop offset="65%" stop-color="#d97706" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#451a03" stop-opacity="0.95" />
    </radialGradient>
    <linearGradient id="ignArmor" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#334155" />
      <stop offset="50%" stop-color="#78350f" />
      <stop offset="100%" stop-color="#1c1917" />
    </linearGradient>
    <linearGradient id="ignHighlight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fef08a" />
      <stop offset="100%" stop-color="#d97706" opacity="0.1" />
    </linearGradient>
    <linearGradient id="ignGoldGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fffbeb" />
      <stop offset="40%" stop-color="#fbbf24" />
      <stop offset="100%" stop-color="#d97706" />
    </linearGradient>
    <filter id="ignGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <circle cx="256" cy="256" r="236" fill="url(#ignBg)" stroke="url(#ignGoldGlow)" stroke-width="10" />
  <circle cx="256" cy="256" r="212" fill="none" stroke="#fde047" stroke-opacity="0.2" stroke-width="3" stroke-dasharray="16 10" />

  <!-- Bust & Shoulder Armor -->
  <g>
    <path d="M 90 440 L 140 350 L 210 370 L 180 440 Z" fill="url(#ignArmor)" stroke="#d97706" stroke-width="3" />
    <path d="M 105 425 L 140 360 L 195 375" fill="none" stroke="url(#ignHighlight)" stroke-width="2" />
    
    <path d="M 422 440 L 372 350 L 302 370 L 332 440 Z" fill="url(#ignArmor)" stroke="#d97706" stroke-width="3" />
    <path d="M 407 425 L 372 360 L 317 375" fill="none" stroke="url(#ignHighlight)" stroke-width="2" />

    <path d="M 175 440 L 210 365 L 256 385 L 302 365 L 337 440 Z" fill="#451a03" stroke="url(#ignGoldGlow)" stroke-width="4" />
    <polygon points="256,380 275,415 256,435 237,415" fill="url(#ignGoldGlow)" filter="url(#ignGlow)" />
    <path d="M 210 365 L 256 340 L 302 365" fill="#78350f" stroke="#fbbf24" stroke-width="3" />
  </g>

  <!-- Neck Guard -->
  <path d="M 210 340 L 256 355 L 302 340 L 285 300 L 227 300 Z" fill="#292524" stroke="#fbbf24" stroke-width="3" />

  <!-- Helmet & Flame Crown Visor -->
  <g>
    <path d="M 160 250 C 160 140, 352 140, 352 250 L 330 330 L 256 360 L 182 330 Z" fill="url(#ignArmor)" stroke="#fbbf24" stroke-width="5" />
    
    <!-- Flame Crown Rays -->
    <path d="M 256 90 L 275 160 L 256 180 L 237 160 Z" fill="#f59e0b" filter="url(#ignGlow)" />
    <path d="M 210 120 L 235 170 L 210 180 L 195 150 Z" fill="#ef4444" />
    <path d="M 302 120 L 317 150 L 302 180 L 277 170 Z" fill="#ef4444" />

    <!-- Cheek Armor -->
    <path d="M 175 250 L 215 320 L 256 345 L 297 320 L 337 250 L 315 240 L 256 250 L 197 240 Z" fill="#1c1917" stroke="#b45309" stroke-width="4" />

    <!-- Glowing Amber Visor -->
    <g filter="url(#ignGlow)">
      <path d="M 185 230 L 327 230 L 305 270 L 256 285 L 207 270 Z" fill="#b45309" stroke="url(#ignGoldGlow)" stroke-width="4" />
      <polygon points="200,242 245,242 238,258 207,258" fill="#fffbeb" />
      <polygon points="312,242 267,242 274,258 305,258" fill="#fffbeb" />
      <line x1="190" y1="234" x2="322" y2="234" stroke="#ffffff" stroke-width="3" stroke-linecap="round" />
    </g>
  </g>
</svg>
