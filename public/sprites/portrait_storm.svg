<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Lightning Teal/Emerald Storm Radial Background -->
    <radialGradient id="stoBg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2dd4bf" stop-opacity="0.55" />
      <stop offset="65%" stop-color="#0f766e" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#042f2e" stop-opacity="0.98" />
    </radialGradient>

    <linearGradient id="stoMetal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5eead4" />
      <stop offset="50%" stop-color="#115e59" />
      <stop offset="100%" stop-color="#042f2e" />
    </linearGradient>

    <linearGradient id="stoLightningGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f0fdfa" />
      <stop offset="30%" stop-color="#2dd4bf" />
      <stop offset="100%" stop-color="#0d9488" />
    </linearGradient>

    <filter id="stoGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="9" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Electric Storm Dial Outer Ring -->
  <circle cx="256" cy="256" r="236" fill="url(#stoBg)" stroke="url(#stoLightningGlow)" stroke-width="10" />
  <circle cx="256" cy="256" r="215" fill="none" stroke="#99f6e4" stroke-opacity="0.4" stroke-width="3" stroke-dasharray="4 8 12 8" />

  <!-- Electric Lightning Bolts Background -->
  <g stroke="url(#stoLightningGlow)" stroke-width="3" fill="none" filter="url(#stoGlow)">
    <path d="M 100 80 L 140 160 L 110 180 L 160 260" />
    <path d="M 412 80 L 372 160 L 402 180 L 352 260" />
  </g>

  <!-- Lightning Conductor Shoulder Plates -->
  <g>
    <!-- Left Conductor Shoulder -->
    <path d="M 80 440 L 130 320 L 200 350 L 165 440 Z" fill="url(#stoMetal)" stroke="url(#stoLightningGlow)" stroke-width="4" />
    <line x1="105" y1="380" x2="175" y2="350" stroke="#f0fdfa" stroke-width="3" filter="url(#stoGlow)" />

    <!-- Right Conductor Shoulder -->
    <path d="M 432 440 L 382 320 L 312 350 L 347 440 Z" fill="url(#stoMetal)" stroke="url(#stoLightningGlow)" stroke-width="4" />
    <line x1="407" y1="380" x2="337" y2="350" stroke="#f0fdfa" stroke-width="3" filter="url(#stoGlow)" />

    <!-- Storm Core Chestpiece -->
    <path d="M 175 440 L 210 360 L 256 380 L 302 360 L 337 440 Z" fill="#042f2e" stroke="#14b8a6" stroke-width="4" />
    <polygon points="256,365 275,400 256,425 237,400" fill="url(#stoLightningGlow)" filter="url(#stoGlow)" />
  </g>

  <!-- Storm Weaver High-Tech Lightning Crown & Visor -->
  <g>
    <!-- Helmet Base -->
    <path d="M 160 250 C 160 130, 352 130, 352 250 L 330 330 L 256 360 L 182 330 Z" fill="url(#stoMetal)" stroke="#2dd4bf" stroke-width="5" />

    <!-- Jagged Twin Lightning Rod Horn Crest -->
    <path d="M 256 160 L 220 60 L 240 130 L 200 180 Z" fill="url(#stoLightningGlow)" filter="url(#stoGlow)" />
    <path d="M 256 160 L 292 60 L 272 130 L 312 180 Z" fill="url(#stoLightningGlow)" filter="url(#stoGlow)" />

    <!-- Angular Metallic Face Guard -->
    <path d="M 175 250 L 215 320 L 256 345 L 297 320 L 337 250 L 256 265 Z" fill="#042f2e" stroke="#0f766e" stroke-width="4" />

    <!-- Jagged Glowing Electric Lightning Bolt Visor -->
    <g filter="url(#stoGlow)">
      <path d="M 180 235 L 230 235 L 245 250 L 267 235 L 332 235 L 310 265 L 256 275 L 202 265 Z" fill="#0d9488" stroke="#f0fdfa" stroke-width="3" />
      <path d="M 190 245 L 230 245 L 256 260 L 282 245 L 322 245" stroke="#ffffff" stroke-width="4" stroke-linecap="round" />
    </g>
  </g>
</svg>
