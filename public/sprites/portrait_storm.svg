<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <radialGradient id="stoBg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#818cf8" stop-opacity="0.45" />
      <stop offset="65%" stop-color="#4f46e5" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#1e1b4b" stop-opacity="0.95" />
    </radialGradient>
    <linearGradient id="stoArmor" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#312e81" />
      <stop offset="50%" stop-color="#1e1b4b" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
    <linearGradient id="stoHighlight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#c7d2fe" />
      <stop offset="100%" stop-color="#6366f1" opacity="0.1" />
    </linearGradient>
    <linearGradient id="stoPlasmaGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e0e7ff" />
      <stop offset="40%" stop-color="#818cf8" />
      <stop offset="100%" stop-color="#4f46e5" />
    </linearGradient>
    <filter id="stoGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <circle cx="256" cy="256" r="236" fill="url(#stoBg)" stroke="url(#stoPlasmaGlow)" stroke-width="10" />
  <circle cx="256" cy="256" r="212" fill="none" stroke="#a5b4fc" stroke-opacity="0.2" stroke-width="3" stroke-dasharray="16 10" />

  <!-- Bust & Shoulder Armor -->
  <g>
    <path d="M 90 440 L 140 350 L 210 370 L 180 440 Z" fill="url(#stoArmor)" stroke="#4f46e5" stroke-width="3" />
    <path d="M 105 425 L 140 360 L 195 375" fill="none" stroke="url(#stoHighlight)" stroke-width="2" />
    
    <path d="M 422 440 L 372 350 L 302 370 L 332 440 Z" fill="url(#stoArmor)" stroke="#4f46e5" stroke-width="3" />
    <path d="M 407 425 L 372 360 L 317 375" fill="none" stroke="url(#stoHighlight)" stroke-width="2" />

    <path d="M 175 440 L 210 365 L 256 385 L 302 365 L 337 440 Z" fill="#1e1b4b" stroke="url(#stoPlasmaGlow)" stroke-width="4" />
    <polygon points="256,380 275,415 256,435 237,415" fill="url(#stoPlasmaGlow)" filter="url(#stoGlow)" />
    <path d="M 210 365 L 256 340 L 302 365" fill="#312e81" stroke="#818cf8" stroke-width="3" />
  </g>

  <!-- Neck Guard -->
  <path d="M 210 340 L 256 355 L 302 340 L 285 300 L 227 300 Z" fill="#1e1b4b" stroke="#818cf8" stroke-width="3" />

  <!-- Helmet & Plasma Visor -->
  <g>
    <path d="M 160 250 C 160 140, 352 140, 352 250 L 330 330 L 256 360 L 182 330 Z" fill="url(#stoArmor)" stroke="#818cf8" stroke-width="5" />
    
    <!-- Lightning Bolt Crest -->
    <path d="M 270 95 L 230 175 L 260 175 L 240 230 L 290 155 L 260 155 Z" fill="#818cf8" stroke="url(#stoPlasmaGlow)" stroke-width="2" filter="url(#stoGlow)" />

    <!-- Cheek Armor -->
    <path d="M 175 250 L 215 320 L 256 345 L 297 320 L 337 250 L 315 240 L 256 250 L 197 240 Z" fill="#0f172a" stroke="#4f46e5" stroke-width="4" />

    <!-- Glowing Electric Blue Visor -->
    <g filter="url(#stoGlow)">
      <path d="M 185 230 L 327 230 L 305 270 L 256 285 L 207 270 Z" fill="#4f46e5" stroke="url(#stoPlasmaGlow)" stroke-width="4" />
      <polygon points="200,242 245,242 238,258 207,258" fill="#e0e7ff" />
      <polygon points="312,242 267,242 274,258 305,258" fill="#e0e7ff" />
      <line x1="190" y1="234" x2="322" y2="234" stroke="#ffffff" stroke-width="3" stroke-linecap="round" />
    </g>
  </g>
</svg>
