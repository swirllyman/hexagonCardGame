<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Deep Void / Purple Radial Background -->
    <radialGradient id="shaBg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c084fc" stop-opacity="0.55" />
      <stop offset="65%" stop-color="#7e22ce" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#1e1b4b" stop-opacity="0.98" />
    </radialGradient>

    <linearGradient id="shaPurpleGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#faf5ff" />
      <stop offset="40%" stop-color="#c084fc" />
      <stop offset="100%" stop-color="#7e22ce" />
    </linearGradient>

    <linearGradient id="shaCowl" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3b0764" />
      <stop offset="100%" stop-color="#0f0728" />
    </linearGradient>

    <filter id="shaGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <circle cx="256" cy="256" r="236" fill="url(#shaBg)" stroke="url(#shaPurpleGlow)" stroke-width="10" />
  <circle cx="256" cy="256" r="215" fill="none" stroke="#e9d5ff" stroke-opacity="0.3" stroke-width="2" stroke-dasharray="6 6" />

  <!-- Shadow Assassin Dark Cowl & Scarf -->
  <path d="M 120 450 C 120 320 180 290 256 290 C 332 290 392 320 392 450 Z" fill="url(#shaCowl)" stroke="#a855f7" stroke-width="3" />

  <!-- Sharp Shadow Daggers Cross Collar -->
  <g stroke="url(#shaPurpleGlow)" stroke-width="3" fill="#1e1b4b">
    <path d="M 110 410 L 220 340 L 240 370 Z" />
    <path d="M 402 410 L 292 340 L 272 370 Z" />
  </g>

  <!-- Deep Shadowed Assassin Hood & Ninja Face Veil -->
  <g>
    <!-- Pointed Hood Peak -->
    <path d="M 256 60 Q 150 140 140 260 C 140 350 200 360 256 360 C 312 360 372 350 372 260 Q 362 140 256 60 Z" fill="url(#shaCowl)" stroke="url(#shaPurpleGlow)" stroke-width="4" />
    <path d="M 256 60 L 256 180" stroke="#a855f7" stroke-width="3" fill="none" opacity="0.6" />

    <!-- Pure Pitch-Black Void Inner Face Cavity -->
    <path d="M 165 240 C 165 170 347 170 347 240 L 320 320 L 256 335 L 192 320 Z" fill="#030008" />

    <!-- Lower Ninja Mask / Cloth Veil -->
    <path d="M 175 255 L 256 270 L 337 255 L 320 320 L 256 335 L 192 320 Z" fill="#1e1b4b" stroke="#7e22ce" stroke-width="3" />

    <!-- Single Lethal Glowing Violet Eye / Slit -->
    <g filter="url(#shaGlow)">
      <!-- Twin Piercing Glowing Eyes in pitch black hood -->
      <polygon points="195,225 240,230 235,245 200,242" fill="#faf5ff" stroke="#c084fc" stroke-width="2" />
      <polygon points="317,225 272,230 277,245 312,242" fill="#faf5ff" stroke="#c084fc" stroke-width="2" />
    </g>
  </g>
</svg>
