<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <radialGradient id="shaBg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c084fc" stop-opacity="0.45" />
      <stop offset="65%" stop-color="#7e22ce" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#1e1b4b" stop-opacity="0.95" />
    </radialGradient>
    <linearGradient id="shaArmor" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b0764" />
      <stop offset="50%" stop-color="#1e1b4b" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
    <linearGradient id="shaHighlight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e9d5ff" />
      <stop offset="100%" stop-color="#a855f7" opacity="0.1" />
    </linearGradient>
    <linearGradient id="shaPurpleGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#faf5ff" />
      <stop offset="40%" stop-color="#c084fc" />
      <stop offset="100%" stop-color="#7e22ce" />
    </linearGradient>
    <filter id="shaGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <circle cx="256" cy="256" r="236" fill="url(#shaBg)" stroke="url(#shaPurpleGlow)" stroke-width="10" />
  <circle cx="256" cy="256" r="212" fill="none" stroke="#e9d5ff" stroke-opacity="0.2" stroke-width="3" stroke-dasharray="16 10" />

  <!-- Bust & Shoulder Armor -->
  <g>
    <path d="M 90 440 L 140 350 L 210 370 L 180 440 Z" fill="url(#shaArmor)" stroke="#7e22ce" stroke-width="3" />
    <path d="M 105 425 L 140 360 L 195 375" fill="none" stroke="url(#shaHighlight)" stroke-width="2" />
    
    <path d="M 422 440 L 372 350 L 302 370 L 332 440 Z" fill="url(#shaArmor)" stroke="#7e22ce" stroke-width="3" />
    <path d="M 407 425 L 372 360 L 317 375" fill="none" stroke="url(#shaHighlight)" stroke-width="2" />

    <path d="M 175 440 L 210 365 L 256 385 L 302 365 L 337 440 Z" fill="#0f0728" stroke="url(#shaPurpleGlow)" stroke-width="4" />
    <polygon points="256,380 275,415 256,435 237,415" fill="url(#shaPurpleGlow)" filter="url(#shaGlow)" />
    <path d="M 210 365 L 256 340 L 302 365" fill="#3b0764" stroke="#c084fc" stroke-width="3" />
  </g>

  <!-- Neck Guard & Stealth Hood Base -->
  <path d="M 210 340 L 256 355 L 302 340 L 285 300 L 227 300 Z" fill="#0f0728" stroke="#c084fc" stroke-width="3" />

  <!-- Helmet & Stealth Mask -->
  <g>
    <path d="M 160 250 C 160 140, 352 140, 352 250 L 330 330 L 256 360 L 182 330 Z" fill="url(#shaArmor)" stroke="#c084fc" stroke-width="5" />
    
    <!-- Cowl Peak -->
    <path d="M 256 110 L 276 180 L 256 200 L 236 180 Z" fill="#581c87" stroke="url(#shaPurpleGlow)" stroke-width="2" />

    <!-- Cheek Armor -->
    <path d="M 175 250 L 215 320 L 256 345 L 297 320 L 337 250 L 315 240 L 256 250 L 197 240 Z" fill="#0f0728" stroke="#7e22ce" stroke-width="4" />

    <!-- Glowing Purple Visor -->
    <g filter="url(#shaGlow)">
      <path d="M 185 230 L 327 230 L 305 270 L 256 285 L 207 270 Z" fill="#7e22ce" stroke="url(#shaPurpleGlow)" stroke-width="4" />
      <polygon points="200,242 245,242 238,258 207,258" fill="#faf5ff" />
      <polygon points="312,242 267,242 274,258 305,258" fill="#faf5ff" />
      <line x1="190" y1="234" x2="322" y2="234" stroke="#ffffff" stroke-width="3" stroke-linecap="round" />
    </g>
  </g>
</svg>
