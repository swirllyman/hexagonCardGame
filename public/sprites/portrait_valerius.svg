<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Dark Crimson Radial Background -->
    <radialGradient id="valBg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f43f5e" stop-opacity="0.5" />
      <stop offset="60%" stop-color="#881337" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#090d16" stop-opacity="0.98" />
    </radialGradient>

    <!-- Crimson Vanguard Gold & Steel Metallic Armor -->
    <linearGradient id="valSteel" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#475569" />
      <stop offset="50%" stop-color="#1e293b" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>

    <linearGradient id="valGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fef08a" />
      <stop offset="50%" stop-color="#eab308" />
      <stop offset="100%" stop-color="#854d0e" />
    </linearGradient>

    <linearGradient id="valCrimsonGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff1f2" />
      <stop offset="40%" stop-color="#fb7185" />
      <stop offset="100%" stop-color="#e11d48" />
    </linearGradient>

    <linearGradient id="valCape" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#be123c" />
      <stop offset="100%" stop-color="#4c0519" />
    </linearGradient>

    <filter id="valGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="7" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Outer Ring with Battle Notch Details -->
  <circle cx="256" cy="256" r="236" fill="url(#valBg)" stroke="url(#valGold)" stroke-width="12" />
  <circle cx="256" cy="256" r="212" fill="none" stroke="#fda4af" stroke-opacity="0.3" stroke-width="3" stroke-dasharray="24 12" />

  <!-- Crimson High-Collar Officer Cape -->
  <path d="M 100 450 Q 80 340 160 310 L 256 340 L 352 310 Q 432 340 412 450 Z" fill="url(#valCape)" stroke="#881337" stroke-width="4" />

  <!-- Heavy Paladins Shoulder Guards (Spiked Pauldrons) -->
  <g>
    <!-- Left Layered Pauldron -->
    <path d="M 70 440 L 120 320 L 195 345 L 165 440 Z" fill="url(#valSteel)" stroke="url(#valGold)" stroke-width="4" />
    <path d="M 60 380 L 120 320 L 145 390 Z" fill="url(#valGold)" stroke="#881337" stroke-width="2" />

    <!-- Right Layered Pauldron -->
    <path d="M 442 440 L 392 320 L 317 345 L 347 440 Z" fill="url(#valSteel)" stroke="url(#valGold)" stroke-width="4" />
    <path d="M 452 380 L 392 320 L 367 390 Z" fill="url(#valGold)" stroke="#881337" stroke-width="2" />

    <!-- Chest Armor Plate with Lion/Star Crest Emblem -->
    <path d="M 175 440 L 205 345 L 256 365 L 307 345 L 337 440 Z" fill="#0f172a" stroke="url(#valCrimsonGlow)" stroke-width="4" />
    <polygon points="256,365 272,395 305,395 278,415 288,445 256,425 224,445 234,415 207,395 240,395" fill="url(#valGold)" filter="url(#valGlow)" />
  </g>

  <!-- Commander Knight Helm & Winged Crest -->
  <g>
    <!-- Knight Helmet Base -->
    <path d="M 165 240 C 165 120, 347 120, 347 240 L 325 330 L 256 355 L 187 330 Z" fill="url(#valSteel)" stroke="url(#valGold)" stroke-width="6" />

    <!-- Majestic Winged Helmet Crest -->
    <path d="M 256 80 L 278 170 L 256 210 L 234 170 Z" fill="url(#valGold)" filter="url(#valGlow)" stroke="#be123c" stroke-width="2" />
    <path d="M 256 120 L 320 100 L 290 170 Z" fill="url(#valCrimsonGlow)" opacity="0.9" />
    <path d="M 256 120 L 192 100 L 222 170 Z" fill="url(#valCrimsonGlow)" opacity="0.9" />

    <!-- Angular Heavy Faceplate -->
    <path d="M 180 240 L 215 315 L 256 335 L 297 315 L 332 240 L 256 260 Z" fill="#090d16" stroke="url(#valSteel)" stroke-width="4" />

    <!-- T-Shaped Glowing Vanguard Visor Slot -->
    <g filter="url(#valGlow)">
      <!-- Horizontal Eyeslit -->
      <path d="M 190 220 L 322 220 L 310 248 L 256 258 L 202 248 Z" fill="#be123c" stroke="url(#valCrimsonGlow)" stroke-width="3" />
      <!-- Vertical Breathing Slit -->
      <path d="M 248 248 L 264 248 L 260 300 L 252 300 Z" fill="#fb7185" />
      
      <!-- Glowing Eyes -->
      <circle cx="225" cy="232" r="6" fill="#ffffff" />
      <circle cx="287" cy="232" r="6" fill="#ffffff" />
    </g>
  </g>
</svg>
