<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Radial Glow -->
    <radialGradient id="valBg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f43f5e" stop-opacity="0.45" />
      <stop offset="65%" stop-color="#881337" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#090d16" stop-opacity="0.95" />
    </radialGradient>
    
    <!-- Metallic Armor Gradients -->
    <linearGradient id="valArmor" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#334155" />
      <stop offset="50%" stop-color="#1e293b" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
    <linearGradient id="valHighlight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#94a3b8" />
      <stop offset="100%" stop-color="#334155" opacity="0.1" />
    </linearGradient>
    
    <!-- Red Faction Energy Gradient -->
    <linearGradient id="valRedGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffe4e6" />
      <stop offset="40%" stop-color="#fb7185" />
      <stop offset="100%" stop-color="#e11d48" />
    </linearGradient>
    
    <!-- Glow Filters -->
    <filter id="valGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Frame Background & Tech Ring -->
  <circle cx="256" cy="256" r="236" fill="url(#valBg)" stroke="url(#valRedGlow)" stroke-width="10" />
  <circle cx="256" cy="256" r="212" fill="none" stroke="#fda4af" stroke-opacity="0.2" stroke-width="3" stroke-dasharray="16 10" />

  <!-- Character Bust: Shoulders & Chest Armor -->
  <g>
    <!-- Left Shoulder Pad -->
    <path d="M 90 440 L 140 350 L 210 370 L 180 440 Z" fill="url(#valArmor)" stroke="#475569" stroke-width="3" />
    <path d="M 105 425 L 140 360 L 195 375" fill="none" stroke="url(#valHighlight)" stroke-width="2" />
    
    <!-- Right Shoulder Pad -->
    <path d="M 422 440 L 372 350 L 302 370 L 332 440 Z" fill="url(#valArmor)" stroke="#475569" stroke-width="3" />
    <path d="M 407 425 L 372 360 L 317 375" fill="none" stroke="url(#valHighlight)" stroke-width="2" />

    <!-- Chest Armor Plate & Red Energy Core -->
    <path d="M 175 440 L 210 365 L 256 385 L 302 365 L 337 440 Z" fill="#0b0f19" stroke="url(#valRedGlow)" stroke-width="4" />
    <polygon points="256,380 275,415 256,435 237,415" fill="url(#valRedGlow)" filter="url(#valGlow)" />
    <path d="M 210 365 L 256 340 L 302 365" fill="#1e293b" stroke="#475569" stroke-width="3" />
  </g>

  <!-- Neck Guard -->
  <path d="M 210 340 L 256 355 L 302 340 L 285 300 L 227 300 Z" fill="#0f172a" stroke="#334155" stroke-width="3" />

  <!-- Helmet & Faceplate -->
  <g>
    <!-- Helmet Outer Shell -->
    <path d="M 160 250 C 160 140, 352 140, 352 250 L 330 330 L 256 360 L 182 330 Z" fill="url(#valArmor)" stroke="#64748b" stroke-width="5" />
    <!-- Helmet Top Specular Crest -->
    <path d="M 256 120 L 270 200 L 256 220 L 242 200 Z" fill="#475569" stroke="url(#valRedGlow)" stroke-width="2" />

    <!-- Cheek & Jaw Armor Plates -->
    <path d="M 175 250 L 215 320 L 256 345 L 297 320 L 337 250 L 315 240 L 256 250 L 197 240 Z" fill="#090d16" stroke="#334155" stroke-width="4" />

    <!-- Glowing Tactical Crimson Visor -->
    <g filter="url(#valGlow)">
      <path d="M 185 230 L 327 230 L 305 270 L 256 285 L 207 270 Z" fill="#be123c" stroke="url(#valRedGlow)" stroke-width="4" />
      <!-- Sharp Twin Glowing Red Optics -->
      <polygon points="200,242 245,242 238,258 207,258" fill="#fff1f2" />
      <polygon points="312,242 267,242 274,258 305,258" fill="#fff1f2" />
      <line x1="190" y1="234" x2="322" y2="234" stroke="#ffffff" stroke-width="3" stroke-linecap="round" />
    </g>

    <!-- Ear / Side Audio Vents -->
    <rect x="150" y="235" width="15" height="35" rx="4" fill="#334155" stroke="url(#valRedGlow)" stroke-width="2" />
    <rect x="347" y="235" width="15" height="35" rx="4" fill="#334155" stroke="url(#valRedGlow)" stroke-width="2" />
  </g>
</svg>
