<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Azure Arcane Sky/Cyan Radial Background -->
    <radialGradient id="kaeBg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.55" />
      <stop offset="60%" stop-color="#0284c7" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#030712" stop-opacity="0.98" />
    </radialGradient>

    <!-- Silver & Crystal Energy Gradients -->
    <linearGradient id="kaeSilver" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#cbd5e1" />
      <stop offset="50%" stop-color="#64748b" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>

    <linearGradient id="kaeCyanGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f0f9ff" />
      <stop offset="40%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#0284c7" />
    </linearGradient>

    <linearGradient id="kaeRobe" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0369a1" />
      <stop offset="100%" stop-color="#0c4a6e" />
    </linearGradient>

    <filter id="kaeGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Arcane Mana Dial Outer Ring -->
  <circle cx="256" cy="256" r="236" fill="url(#kaeBg)" stroke="url(#kaeCyanGlow)" stroke-width="10" />
  <circle cx="256" cy="256" r="215" fill="none" stroke="#7dd3fc" stroke-opacity="0.4" stroke-width="2" stroke-dasharray="8 6 16 6" />

  <!-- Floating Arcane Rune Symbols in Background -->
  <g stroke="#38bdf8" stroke-opacity="0.35" stroke-width="2" fill="none">
    <polygon points="256,60 270,85 242,85" />
    <polygon points="85,256 105,242 105,270" />
    <polygon points="427,256 407,242 407,270" />
  </g>

  <!-- Arcane High Collar & Hooded Robe -->
  <path d="M 110 450 Q 130 310 256 310 Q 382 310 402 450 Z" fill="url(#kaeRobe)" stroke="#38bdf8" stroke-width="3" />

  <!-- Sleek Wizard Mantle & Floating Crystal Shoulders -->
  <g>
    <!-- Left Crystal Shoulder Blade -->
    <path d="M 90 420 L 140 310 L 200 350 L 160 440 Z" fill="url(#kaeSilver)" stroke="url(#kaeCyanGlow)" stroke-width="3" />
    <polygon points="120,290 145,340 100,350" fill="url(#kaeCyanGlow)" filter="url(#kaeGlow)" />

    <!-- Right Crystal Shoulder Blade -->
    <path d="M 422 420 L 372 310 L 312 350 L 352 440 Z" fill="url(#kaeSilver)" stroke="url(#kaeCyanGlow)" stroke-width="3" />
    <polygon points="392,290 367,340 412,350" fill="url(#kaeCyanGlow)" filter="url(#kaeGlow)" />
  </g>

  <!-- Arcane Spellblade Head: Hooded Sleek Mask with Floating Mana Horns -->
  <g>
    <!-- Deep Mage Hood -->
    <path d="M 145 250 C 145 110, 367 110, 367 250 L 340 340 L 256 370 L 172 340 Z" fill="#0f172a" stroke="url(#kaeCyanGlow)" stroke-width="4" />

    <!-- Twin Giant Arcane Blade Horns -->
    <path d="M 256 160 Q 180 80 130 40 Q 180 130 220 180 Z" fill="url(#kaeCyanGlow)" filter="url(#kaeGlow)" />
    <path d="M 256 160 Q 332 80 382 40 Q 332 130 292 180 Z" fill="url(#kaeCyanGlow)" filter="url(#kaeGlow)" />

    <!-- Center Floating Mana Gem on Forehead -->
    <polygon points="256,120 272,150 256,180 240,150" fill="#ffffff" filter="url(#kaeGlow)" stroke="#38bdf8" stroke-width="2" />

    <!-- Sleek Shadowed Face & Single Monocle / Twin Horizontal Cyan Arcane Eyes -->
    <path d="M 175 250 L 210 325 L 256 345 L 302 325 L 337 250 L 256 240 Z" fill="#030712" />

    <!-- Glowing Slit Arcane Eyes & Spellsight Runes -->
    <g filter="url(#kaeGlow)">
      <polygon points="190,245 240,245 230,262 195,262" fill="#e0f2fe" stroke="#38bdf8" stroke-width="2" />
      <polygon points="322,245 272,245 282,262 317,262" fill="#e0f2fe" stroke="#38bdf8" stroke-width="2" />
      <!-- Horizontal Arcane Beam -->
      <line x1="160" y1="253" x2="352" y2="253" stroke="#38bdf8" stroke-width="3" stroke-dasharray="30 10" />
    </g>
  </g>
</svg>
